version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commercepass
      POSTGRES_DB: commerce
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:-postgresql://commerce:commercepass@db:5432/commerce}
      UPLOAD_FOLDER: /data/uploads
      REPORTS_FOLDER: /data/reports
    volumes:
      - backend_data:/data

volumes:
  db_data:
  backend_data:
